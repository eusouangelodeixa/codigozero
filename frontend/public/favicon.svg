<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0A0A0A"/>

  <!-- Circle ring -->
  <circle cx="50" cy="50" r="38" stroke="#2DD4BF" stroke-width="3.5" fill="none"/>

  <!-- Shadow depth for "/" -->
  <text x="23" y="71" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="700" fill="#1a9e8e" opacity="0.5">/</text>
  <!-- Main "/" -->
  <text x="21" y="69" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="700" fill="#2DD4BF">/</text>

  <!-- Shadow depth for "{" -->
  <text x="51" y="71" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="700" fill="#1a9e8e" opacity="0.5">{</text>
  <!-- Main "{" -->
  <text x="49" y="69" font-family="'Courier New', Courier, monospace" font-size="42" font-weight="700" fill="#2DD4BF">{</text>
</svg>
