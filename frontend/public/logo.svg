<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#0A0A0A"/>

  <!-- Circle ring -->
  <circle cx="200" cy="165" r="105" stroke="#2DD4BF" stroke-width="9" fill="none"/>

  <!-- Shadow / depth for "/" -->
  <text x="148" y="207" font-family="'Courier New', Courier, monospace" font-size="105" font-weight="700" fill="#1a9e8e" opacity="0.6">/</text>
  <!-- Main "/" -->
  <text x="143" y="202" font-family="'Courier New', Courier, monospace" font-size="105" font-weight="700" fill="#2DD4BF">/</text>

  <!-- Shadow / depth for "{" -->
  <text x="213" y="211" font-family="'Courier New', Courier, monospace" font-size="105" font-weight="700" fill="#1a9e8e" opacity="0.6">{</text>
  <!-- Main "{" -->
  <text x="208" y="206" font-family="'Courier New', Courier, monospace" font-size="105" font-weight="700" fill="#2DD4BF">{</text>

  <!-- CÓDIGO ZERO text -->
  <text x="200" y="320" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="46" font-weight="700" fill="white" text-anchor="middle" letter-spacing="6">CÓDIGO ZERO</text>
</svg>
