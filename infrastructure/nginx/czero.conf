# =============================================================================
# CÓDIGO ZERO — Production Nginx Configuration
# Domain: czero.sbs | All subdomains
# Generated: 2026-05-05
# =============================================================================

# ── HTTP → HTTPS Redirect (all czero.sbs subdomains) ─────────────────────────
server {
    listen 80;
    server_name czero.sbs www.czero.sbs app.czero.sbs api.czero.sbs docs.czero.sbs
                status.czero.sbs webhook.czero.sbs admin.czero.sbs cdn.czero.sbs;

    # ACME challenge for certbot (Let's Encrypt auto-renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Landing Page (czero.sbs / www.czero.sbs) ─────────────────────────────────
server {
    listen 443 ssl;
    server_name czero.sbs www.czero.sbs;

    ssl_certificate     /etc/nginx/ssl/live/czero.sbs/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/czero.sbs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:CZeroSSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # For now, redirect to the app (future: landing page)
    location / {
        return 301 https://app.czero.sbs$request_uri;
    }
}

# ── App Dashboard (app.czero.sbs) — MAIN PLATFORM ⭐ ─────────────────────────
server {
    listen 443 ssl;
    server_name app.czero.sbs;

    ssl_certificate     /etc/nginx/ssl/live/czero.sbs/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/czero.sbs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:CZeroSSL:10m;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API routes → Código Zero Backend (port 4000)
    location /api/ {
        set $czero_backend http://czero_backend_prod:4000;
        proxy_pass         $czero_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Uploads (static files from backend)
    location /uploads/ {
        set $czero_backend http://czero_backend_prod:4000;
        proxy_pass         $czero_backend;
        proxy_set_header   Host $host;
    }

    # Frontend routes → Código Zero Frontend (Next.js on port 3000)
    location / {
        set $czero_frontend http://czero_frontend_prod:3000;
        proxy_pass         $czero_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Next.js static assets
    location /_next/ {
        set $czero_frontend http://czero_frontend_prod:3000;
        proxy_pass         $czero_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API Backend (api.czero.sbs) ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.czero.sbs;

    ssl_certificate     /etc/nginx/ssl/live/czero.sbs/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/czero.sbs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:CZeroSSL:10m;

    client_max_body_size 50M;
    resolver 127.0.0.11 valid=10s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # All requests go directly to backend
    location / {
        set $czero_backend http://czero_backend_prod:4000;
        proxy_pass         $czero_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}

