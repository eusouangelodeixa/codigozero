# ── CDN / Assets (cdn.czero.sbs) ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name cdn.czero.sbs;

    ssl_certificate     /etc/nginx/ssl/live/czero.sbs/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/czero.sbs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:CZeroSSL:10m;

    resolver 127.0.0.11 valid=10s;

    # Serve uploads/assets from backend
    location / {
        set $czero_backend http://czero_backend_prod:4000;
        proxy_pass         $czero_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }
}
